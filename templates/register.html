<!DOCTYPE html>
<html>
<head>
<title>Register - Smart Job Portal</title>

<style>

body{
    font-family: Arial;
    background:#f4f6f8;
    margin:0;
}

/* Navigation bar */
.navbar{
    background:#333;
    padding:15px;
    text-align:center;
}

.navbar a{
    color:white;
    margin:15px;
    text-decoration:none;
    font-size:16px;
}

/* Page title */
h1{
    text-align:center;
    margin-top:40px;
}

/* Register card */
.register-card{
    background:white;
    width:350px;
    margin:40px auto;
    padding:30px;
    border-radius:10px;
    box-shadow:0px 0px 10px rgba(0,0,0,0.1);
    text-align:center;
}

/* Inputs */
input{
    width:90%;
    padding:10px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

/* Button */
button{
    padding:10px 20px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}


</style>

</head>

<body>

<div class="navbar">
<a href="/">Home</a>
<a href="/jobs">Jobs</a>
<a href="/saved_jobs">Saved Jobs</a>
<a href="/dashboard">Dashboard</a>
<a href="/profile">Profile</a>
<a href="/my_applications">My Applications</a>
<a href="/admin">Admin</a>
<a href="/logout">Logout</a>
</div>

<h1>Create Account</h1>

<div class="register-card">

{% with messages = get_flashed_messages() %}
{% if messages %}
<p style="color:white; background:green; padding:10px; border-radius:5px;">
    {{ messages[0] }}
</p>

{% endif %}
{% endwith %}

<form method="POST">

<input type="text" name="name" placeholder="Enter Name" required>

<input type="email" name="email" placeholder="Enter Email" required>

<input type="password" name="password" placeholder="Enter Password" required>

<button type="submit">Register</button>

</form>

</div>

</body>
</html>
