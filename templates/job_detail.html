<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{{ job[1] }} | Smart Job Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f8fafc;
    min-height:100vh;
}

/* Navbar */

.navbar{
    background:#0f172a;
    padding:18px 40px;
    display:flex;
    justify-content:center;
    gap:25px;
    flex-wrap:wrap;
}

.navbar a{
    color:white;
    text-decoration:none;
    font-weight:500;
}

.navbar a:hover{
    color:#60a5fa;
}

/* Main Container */

.container{
    max-width:1000px;
    margin:50px auto;
    padding:0 20px;
}

/* Job Card */

.job-card{
    background:white;
    border-radius:20px;
    padding:40px;
    box-shadow:0 15px 35px rgba(0,0,0,.08);
}

.job-title{
    font-size:38px;
    font-weight:700;
    color:#0f172a;
    margin-bottom:10px;
}

.company{
    font-size:20px;
    color:#64748b;
    margin-bottom:20px;
}

.badges{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    margin-bottom:25px;
}

.badge{
    background:#dbeafe;
    color:#2563eb;
    padding:8px 14px;
    border-radius:25px;
    font-size:14px;
    font-weight:600;
}

.section-title{
    margin-top:25px;
    margin-bottom:10px;
    color:#0f172a;
    font-size:22px;
}

.description{
    color:#475569;
    line-height:1.8;
}

/* Apply Box */

.apply-box{
    margin-top:30px;
    padding-top:25px;
    border-top:1px solid #e2e8f0;
}

input[type=file]{
    width:100%;
    padding:12px;
    border:1px solid #cbd5e1;
    border-radius:10px;
    margin-bottom:15px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#2563eb;
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#1d4ed8;
}

.back-btn{
    display:inline-block;
    margin-bottom:20px;
    text-decoration:none;
    color:#2563eb;
    font-weight:600;
}

</style>

</head>

<body>

<div class="navbar">
<a href="/">Home</a>
<a href="/jobs">Jobs</a>
<a href="/saved_jobs">Saved Jobs</a>
<a href="/profile">Profile</a>
<a href="/my_applications">Applications</a>
</div>

<div class="container">

<a href="/jobs" class="back-btn">
← Back to Jobs
</a>

<div class="job-card">

<h1 class="job-title">
{{ job[1] }}
</h1>

<div class="company">
🏢 {{ job[2] }}
</div>

<div class="badges">

{% if job[3] %} <span class="badge">
{{ job[3] }} </span>
{% endif %}

{% if job[5] %} <span class="badge">
📍 {{ job[5] }} </span>
{% endif %}

{% if job[6] %} <span class="badge">
💰 {{ job[6] }} </span>
{% endif %}

</div>

<h3 class="section-title">
Job Description
</h3>

<p class="description">
{{ job[4] }}
</p>

<div class="apply-box">

<form action="/apply/{{ job[0] }}" method="POST" enctype="multipart/form-data">

<input
type="file"
name="resume"
required>

<button type="submit">
🚀 Apply Now
</button>

</form>

</div>

</div>

</div>

</body>
</html>
