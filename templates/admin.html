<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard - Smart Job Portal</title>

<style>

body{
    font-family: Arial;
    background:#f4f6f8;
    margin:0;
}

/* Navigation bar */
.navbar{
    background:#333;
    padding:15px;
    text-align:center;
}

.navbar a{
    color:white;
    margin:15px;
    text-decoration:none;
    font-size:16px;
}

/* Page title */
h1{
    text-align:center;
    margin-top:40px;
}

/* Table container */
.table-container{
    width:70%;
    margin:40px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0px 0px 10px rgba(0,0,0,0.1);
}

/* Table style */
table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#007bff;
    color:white;
}

th, td{
    padding:12px;
    text-align:center;
    border-bottom:1px solid #ddd;
}

/* Resume button */
.resume-btn{
    padding:6px 12px;
    background:#28a745;
    color:white;
    border:none;
    border-radius:5px;
    text-decoration:none;
}

.resume-btn:hover{
    background:#1e7e34;
}

.action-btn{
padding:5px 10px;
background:#007bff;
color:white;
text-decoration:none;
border-radius:4px;
margin:2px;
}

.action-btn:hover{
background:#0056b3;
}

</style>

</head>

<body>

<div class="navbar">
<a href="/">Home</a>
<a href="/jobs">Jobs</a>
<a href="/saved_jobs">Saved Jobs</a>
<a href="/dashboard">Dashboard</a>
<a href="/profile">Profile</a>
<a href="/my_applications">My Applications</a>
<a href="/admin">Admin</a>
<a href="/logout">Logout</a>
</div>

<h1>Job Applications</h1>

<h2 style="text-align:center;">Total Applications: {{ total }}</h2>

<div class="table-container">

<table>

<tr>
<th>Job Title</th>
<th>Company</th>
<th>Resume</th>
<th>Status</th>
<th>Action</th>
</tr>

{% for app in applications %}

<tr>

<td>{{ app[0] }}</td>
<td>{{ app[1] }}</td>

<td>
<a class="resume-btn" href="/uploads/{{ app[2] }}" download>
Download Resume
</a>
</td>

<td>{{ app[3] }}</td>

<td>
<a href="action-btn" href="/update_status/{{ app[4] }}/Reviewed">Review</a>
<a href="action-btn" href="/update_status/{{ app[4] }}/Selected">Select</a>
</td>

</tr>



{% endfor %}

</table>

</div>

</body>
</html>
