<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Saved Jobs</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f4f7fc;
}

/* Navbar */

.navbar{
background:#0f172a;
padding:18px;
text-align:center;
}

.navbar a{
color:white;
text-decoration:none;
margin:15px;
font-weight:600;
}

.navbar a:hover{
color:#60a5fa;
}

/* Hero */

.hero{
background:linear-gradient(135deg,#2563eb,#1d4ed8);
color:white;
text-align:center;
padding:60px 20px;
}

.hero h1{
font-size:42px;
margin-bottom:10px;
}

.hero p{
font-size:18px;
opacity:.9;
}

/* Cards */

.job-card{
background:white;
width:85%;
max-width:900px;
margin:25px auto;
padding:25px;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
transition:.3s;
}

.job-card:hover{
transform:translateY(-5px);
}

.job-title{
font-size:26px;
font-weight:700;
color:#0f172a;
}

.company{
margin-top:10px;
color:#64748b;
font-size:16px;
}

.actions{
margin-top:20px;
}

.view-btn{
display:inline-block;
background:#2563eb;
color:white;
padding:10px 18px;
text-decoration:none;
border-radius:10px;
font-weight:600;
}

.view-btn:hover{
background:#1d4ed8;
}

/* Empty */

.empty{
text-align:center;
margin-top:50px;
font-size:20px;
color:#64748b;
}

</style>

</head>

<body>

<div class="navbar">
<a href="/">Home</a>
<a href="/jobs">Jobs</a>
<a href="/saved_jobs">Saved Jobs</a>
<a href="/dashboard">Dashboard</a>
<a href="/profile">Profile</a>
<a href="/my_applications">My Applications</a>
<a href="/admin">Admin</a>
<a href="/logout">Logout</a>
</div>

<div class="hero">
<h1>⭐ Saved Jobs</h1>
<p>Your bookmarked opportunities</p>
</div>

{% if jobs|length == 0 %}

<div class="empty">
No saved jobs yet.
</div>

{% endif %}

{% for job in jobs %}

<div class="job-card">

<div class="job-title">
{{ job[1] }}
</div>

<div class="company">
🏢 {{ job[2] }}
</div>

<div class="actions">
<a class="view-btn" href="/job/{{ job[0] }}">
View Job
</a>
<a class="view-btn"
   style="background:red;margin-left:10px;"
   href="/unsave_job/{{ job[0] }}">
Remove
</a>
</div>

</div>

{% endfor %}

</body>
</html>
