<!DOCTYPE html>
<html>
<head>
<title>Saved Jobs</title>

<style>

body{
    font-family: Arial;
    background:#f4f6f8;
    margin:0;
}

/* Navbar */
.navbar{
    background:#333;
    padding:15px;
    text-align:center;
}

.navbar a{
    color:white;
    margin:15px;
    text-decoration:none;
    font-weight:bold;
}

.navbar a:hover{
    color:#4CAF50;
}

/* Title */
h1{
    text-align:center;
    margin-top:40px;
}

/* Job Card */
.job-card{
    background:white;
    padding:25px;
    margin:25px auto;
    width:420px;
    border-radius:12px;
    box-shadow:0px 5px 15px rgba(0,0,0,0.1);
}

.job-card:hover{
    transform:scale(1.03);
    transition:0.2s;
}

/* Company */
.company{
    color:gray;
    margin-top:5px;
}

/* Button */
.view-btn{
    display:inline-block;
    margin-top:15px;
    padding:8px 16px;
    background:#007bff;
    color:white;
    text-decoration:none;
    border-radius:5px;
}

.view-btn:hover{
    background:#0056b3;
}

/* Empty message */
.empty{
    text-align:center;
    margin-top:40px;
    color:gray;
}

</style>

</head>

<body>

<div class="navbar">
<a href="/">Home</a>
<a href="/jobs">Jobs</a>
<a href="/saved_jobs">Saved Jobs</a>
<a href="/dashboard">Dashboard</a>
<a href="/profile">Profile</a>
<a href="/my_applications">My Applications</a>
<a href="/admin">Admin</a>
<a href="/logout">Logout</a>
</div>

<h1>Saved Jobs</h1>

{% if jobs|length == 0 %}

<p class="empty">No saved jobs yet.</p>

{% endif %}

{% for job in jobs %}

<div class="job-card">

<h2>{{ job[1] }}</h2>

<div class="company">
Company: {{ job[2] }}
</div>

<a class="view-btn" href="/job/{{ job[0] }}">
View Job
</a>

</div>

{% endfor %}

</body>
</html>
