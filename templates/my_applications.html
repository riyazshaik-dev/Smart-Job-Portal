<!DOCTYPE html>
<html>
<head>
<title>My Applications</title>

<style>

body{
    font-family: Arial;
    background:#f4f6f8;
    margin:0;
}

/* Navbar */
.navbar{
    background:#333;
    padding:15px;
    text-align:center;
}

.navbar a{
    color:white;
    margin:15px;
    text-decoration:none;
    font-weight:bold;
}

.navbar a:hover{
    color:#4CAF50;
}

/* Title */
h1{
    text-align:center;
    margin-top:40px;
}

/* Table container */
.table-box{
    width:70%;
    margin:40px auto;
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0px 5px 15px rgba(0,0,0,0.1);
}

/* Table */
table{
    width:100%;
    border-collapse:collapse;
}

/* Header */
th{
    background:#007bff;
    color:white;
}

/* Table cells */
th,td{
    padding:12px;
    text-align:center;
    border-bottom:1px solid #ddd;
}

/* Row hover */
tr:hover{
    background:#f2f2f2;
}

/* Resume Button */
.resume-btn{
    background:#28a745;
    color:white;
    padding:6px 12px;
    border-radius:5px;
    text-decoration:none;
    font-size:14px;
}

.resume-btn:hover{
    background:#1e7e34;
}

/* No data message */
.empty{
    text-align:center;
    padding:20px;
    color:gray;
}

</style>

</head>

<body>

<div class="navbar">
<a href="/">Home</a>
<a href="/jobs">Jobs</a>
<a href="/saved_jobs">Saved Jobs</a>
<a href="/dashboard">Dashboard</a>
<a href="/profile">Profile</a>
<a href="/my_applications">My Applications</a>
<a href="/admin">Admin</a>
<a href="/logout">Logout</a>
</div>

<h1>My Applied Jobs</h1>

<div class="table-box">

<table>

<tr>
<th>Job Title</th>
<th>Company</th>
<th>Resume</th>
</tr>

{% if applications|length == 0 %}

<tr>
<td colspan="3" class="empty">You have not applied for any jobs yet.</td>
</tr>

{% endif %}

{% for app in applications %}

<tr>

<td>{{ app[0] }}</td>

<td>{{ app[1] }}</td>

<td>
<a class="resume-btn" href="/uploads/{{ app[2] }}" download>
Download Resume
</a>
</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
