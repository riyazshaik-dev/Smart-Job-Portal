<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Profile</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f4f7fc;
}

/* Navbar */

.navbar{
background:#0f172a;
padding:18px;
text-align:center;
}

.navbar a{
color:white;
text-decoration:none;
margin:15px;
font-weight:600;
}

.navbar a:hover{
color:#60a5fa;
}

/* Hero */

.hero{
background:linear-gradient(135deg,#2563eb,#1d4ed8);
padding:60px 20px;
text-align:center;
color:white;
}

.hero h1{
font-size:42px;
}

/* Profile Card */

.profile-card{
max-width:850px;
margin:-30px auto 40px;
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 15px 35px rgba(0,0,0,.08);
text-align:center;
}

/* Avatar */

.profile-img{
width:140px;
height:140px;
border-radius:50%;
border:5px solid #dbeafe;
object-fit:cover;
margin-bottom:15px;
}

.profile-name{
font-size:30px;
font-weight:700;
color:#0f172a;
}

.profile-email{
color:#64748b;
margin-top:5px;
}

/* Stats */

.stats{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
margin-top:30px;
}

.stat-box{
background:#f8fafc;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.05);
}

.stat-box h3{
font-size:32px;
color:#2563eb;
margin-bottom:5px;
}

/* Information */

.info{
margin-top:35px;
text-align:left;
}

.info h2{
margin-bottom:20px;
color:#0f172a;
}

.info-item{
background:#f8fafc;
padding:15px;
border-radius:12px;
margin-bottom:12px;
}

.label{
font-weight:600;
color:#0f172a;
}

/* Button */

.edit-btn{
margin-top:25px;
background:#2563eb;
color:white;
padding:12px 25px;
border:none;
border-radius:12px;
font-size:15px;
font-weight:600;
cursor:pointer;
}

.edit-btn:hover{
background:#1d4ed8;
}

/* Mobile */

@media(max-width:768px){

.stats{
grid-template-columns:1fr;
}

.profile-card{
margin:20px;
padding:25px;
}

}

</style>

</head>

<body>

<div class="navbar">
<a href="/">Home</a>
<a href="/jobs">Jobs</a>
<a href="/saved_jobs">Saved Jobs</a>
<a href="/profile">Profile</a>
<a href="/my_applications">Applications</a>
<a href="/logout">Logout</a>
</div>

<div class="hero">
<h1>My Profile</h1>
</div>

<div class="profile-card">

<img src="https://robohash.org/{{ user[2] }}?size=150x150" class="profile-img">

<div class="profile-name">
{{ user[1] }}
</div>

<div class="profile-email">
{{ user[2] }}
</div>

<div class="stats">

<div class="stat-box">
<h3>{{ total_applications }}</h3>
<p>Applications</p>
</div>

<div class="stat-box">
<h3>{{ total_saved }}</h3>
<p>Saved Jobs</p>
</div>

</div>

<div class="info">

<h2>Profile Information</h2>

<div class="info-item">
<span class="label">Role:</span> Job Seeker
</div>

<div class="info-item">
<span class="label">Skills:</span> Python, HTML, CSS, Flask
</div>

<div class="info-item">
<span class="label">Education:</span> BCA
</div>

<div class="info-item">
<span class="label">Experience:</span> Fresher
</div>

</div>

<button class="edit-btn">
Edit Profile
</button>

</div>

</body>
</html>
