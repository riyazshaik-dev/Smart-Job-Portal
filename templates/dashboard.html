<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard | Smart Job Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f8fafc;
}

/* Navbar */

.navbar{
    background:#0f172a;
    padding:18px;
    display:flex;
    justify-content:center;
    gap:25px;
    flex-wrap:wrap;
}

.navbar a{
    color:white;
    text-decoration:none;
    font-weight:500;
}

.navbar a:hover{
    color:#60a5fa;
}

/* Hero */

.hero{
    background:linear-gradient(135deg,#2563eb,#1d4ed8);
    color:white;
    text-align:center;
    padding:50px 20px;
}

.hero h1{
    font-size:42px;
}

.hero p{
    margin-top:10px;
    opacity:.9;
}

/* Stats */

.stats{
    width:90%;
    max-width:1100px;
    margin:-30px auto 30px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.stat-card{
    background:white;
    padding:25px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.stat-card h2{
    color:#2563eb;
    font-size:32px;
}

.stat-card p{
    color:#64748b;
}

/* Main Card */

.dashboard-card{
    width:90%;
    max-width:900px;
    margin:auto;
    background:white;
    padding:35px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.dashboard-card h2{
    margin-bottom:20px;
    color:#0f172a;
}

/* Inputs */

input,
textarea,
select{
    width:100%;
    padding:14px;
    margin-top:12px;
    border:1px solid #cbd5e1;
    border-radius:12px;
    font-size:15px;
}

input:focus,
textarea:focus,
select:focus{
    outline:none;
    border-color:#2563eb;
}

textarea{
    min-height:120px;
    resize:none;
}

/* Button */

button{
    width:100%;
    margin-top:20px;
    padding:15px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:12px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

/* Footer */

.footer{
    text-align:center;
    margin-top:40px;
    padding:20px;
    color:#64748b;
}

/* Mobile */

@media(max-width:768px){

.hero h1{
    font-size:30px;
}

.dashboard-card{
    padding:20px;
}

}

</style>

</head>

<body>

<div class="navbar">
<a href="/">Home</a>
<a href="/jobs">Jobs</a>
<a href="/saved_jobs">Saved Jobs</a>
<a href="/dashboard">Dashboard</a>
<a href="/profile">Profile</a>
<a href="/my_applications">Applications</a>
<a href="/admin">Admin</a>
<a href="/logout">Logout</a>
</div>

<div class="hero">
<h1>Dashboard</h1>
<p>Manage and publish new job opportunities</p>
</div>

<div class="stats">

<div class="stat-card">
<h2>🚀</h2>
<p>Post New Jobs</p>
</div>

<div class="stat-card">
<h2>📄</h2>
<p>Manage Applications</p>
</div>

<div class="stat-card">
<h2>🏢</h2>
<p>Company Hiring</p>
</div>

</div>

<div class="dashboard-card">

<h2>Post a New Job</h2>

<form action="/post_job" method="POST">

<input type="text"
name="title"
placeholder="Job Title"
required>

<input type="text"
name="company"
placeholder="Company Name"
required>

<input type="text"
name="location"
placeholder="Job Location">

<input type="text"
name="salary"
placeholder="Salary (Example: 8 LPA)">

<select name="category">

<option value="IT">IT</option>
<option value="Developer">Developer</option>
<option value="Designer">Designer</option>
<option value="Marketing">Marketing</option>

</select>

<textarea
name="description"
placeholder="Describe job responsibilities, requirements and benefits">
</textarea>

<button type="submit">
🚀 Publish Job
</button>

</form>

</div>

<div class="footer">
© 2026 Smart Job Portal
</div>

</body>
</html>
