<!DOCTYPE html>
<html>
<head>
<title>Login - Smart Job Portal</title>

<style>

body{
    font-family: Arial;
    background:#f4f6f8;
    margin:0;
}

/* Navbar */
.navbar{
    background:#333;
    padding:15px;
    text-align:center;
}

.navbar a{
    color:white;
    margin:15px;
    text-decoration:none;
    font-size:16px;
}

/* Title */
h1{
    text-align:center;
    margin-top:40px;
}

/* Card */
.login-card{
    background:white;
    width:350px;
    margin:40px auto;
    padding:30px;
    border-radius:10px;
    box-shadow:0px 0px 10px rgba(0,0,0,0.1);
    text-align:center;
}

input{
    width:90%;
    padding:10px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

/* Button */
button{
    padding:10px 20px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

</style>

</head>

<body>

<div class="navbar">
<a href="/">Home</a>
<a href="/jobs">Jobs</a>
<a href="/saved_jobs">Saved Jobs</a>
<a href="/dashboard">Dashboard</a>
<a href="/profile">Profile</a>
<a href="/my_applications">My Applications</a>
<a href="/admin">Admin</a>
<a href="/logout">Logout</a>
</div>

<h1>Login</h1>

<div class="login-card">

<!-- 🔥 Flash message (IMPORTANT) -->
{% with messages = get_flashed_messages() %}
{% if messages %}
<p style="color:red;">{{ messages[0] }}</p>
{% endif %}
{% endwith %}

<!-- 🔥 autocomplete OFF added -->
<form method="POST" autocomplete="off">

<input type="email"
       name="email"
       placeholder="Enter Email"
       required
       autocomplete="off"
       pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$"
       title="Enter valid email like example@gmail.com">

<input type="password"
       name="password"
       placeholder="Enter Password"
       required
       autocomplete="new-password">

<button type="submit">Login</button>

</form>

<!-- 🔥 Register link -->
<p style="margin-top:10px;">
Don't have an account? <a href="/register">Register</a>
</p>

</div>

</body>
</html>
