<!DOCTYPE html>
<html>
<head>
<title>Smart Job Portal</title>

<style>

body{
    font-family: Arial;
    background:#f4f6f8;
    margin:0;
}

/* Navbar */
.navbar{
    background:#333;
    padding:15px;
    text-align:center;
}

.navbar a{
    color:white;
    margin:15px;
    text-decoration:none;
    font-weight:bold;
}

.navbar a:hover{
    color:#4CAF50;
}

/* Hero section */
.hero{
    text-align:center;
    padding:100px 20px;
}

.hero h1{
    font-size:45px;
    margin-bottom:10px;
}

.hero p{
    font-size:20px;
    color:#555;
}

/* Buttons */
.buttons{
    margin-top:30px;
}

.buttons a{
    display:inline-block;
    padding:12px 25px;
    margin:10px;
    background:#007bff;
    color:white;
    text-decoration:none;
    border-radius:6px;
    transition:0.3s;
}

.buttons a:hover{
    background:#0056b3;
    transform:scale(1.05);
}

/* Statistics Section */
.stats{
    display:flex;
    justify-content:center;
    gap:40px;
    padding:60px 20px;
}

.stat-box{
    background:white;
    padding:35px;
    border-radius:12px;
    width:180px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    transition:0.3s;
}

/* Hover animation */
.stat-box:hover{
    transform:translateY(-8px);
}

.stat-box h2{
    color:#007bff;
    font-size:40px;
    margin:0;
}

.stat-box p{
    font-size:18px;
    color:#555;
}


</style>

</head>

<body>

<!-- Navigation Bar -->
<div class="navbar">
<a href="/">Home</a>
<a href="/jobs">Jobs</a>
<a href="/saved_jobs">Saved Jobs</a>
<a href="/dashboard">Dashboard</a>
<a href="/profile">Profile</a>
<a href="/my_applications">My Applications</a>
<a href="/admin">Admin</a>
<a href="/logout">Logout</a>
</div>

<!-- Hero Section -->
<div class="hero">

<h1>Smart Job Portal</h1>
<p>Find your dream job and apply easily</p>

<div class="buttons">
<a href="/register">Register</a>
<a href="/login">Login</a>
<a href="/jobs">Browse Jobs</a>
</div>

</div>

<!-- Statistics Section -->
<div class="stats"
     data-jobs="{{ total_jobs }}"
     data-apps="{{ total_applications }}"
     data-users="{{ total_users }}">

<div class="stat-box">
<h2 id="jobs">0</h2>
<p>Jobs</p>
</div>

<div class="stat-box">
<h2 id="apps">0</h2>
<p>Applications</p>
</div>

<div class="stat-box">
<h2 id="users">0</h2>
<p>Users</p>
</div>

</div>

<!-- Animation Script -->
<script>

const stats = document.querySelector(".stats");

// Convert string to number (IMPORTANT)
let totalJobs = parseInt(stats.dataset.jobs);
let totalApps = parseInt(stats.dataset.apps);
let totalUsers = parseInt(stats.dataset.users);

function animateValue(id, end){

    let obj = document.getElementById(id);
    let start = 0;

    let duration = 1000;
    let increment = Math.ceil(end / (duration / 10));

    let counter = setInterval(function(){

        start += increment;

        if(start >= end){
            start = end;
            clearInterval(counter);
        }

        obj.textContent = start + "+";

    },10);
}

// Run animation
animateValue("jobs", totalJobs);
animateValue("apps", totalApps);
animateValue("users", totalUsers);

</script>

</body>
</html>
